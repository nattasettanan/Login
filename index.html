<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi Login - NTSTN WiFi6</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            font-family: 'Kanit', sans-serif; background-color: black;
        }
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -1; }
        .container { display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 2rem; border-radius: 15px;
            box-shadow: 0 0 30px rgba(0, 255, 70, 0.3);
            width: 320px; text-align: center; backdrop-filter: blur(5px);
        }
        h2 { font-size: 1.2rem; margin-bottom: 1.5rem; color: #222; }
        input {
            width: 100%; padding: 12px; margin: 8px 0;
            border: 1px solid #ccc; border-radius: 8px;
            box-sizing: border-box; font-family: 'Kanit', sans-serif;
            outline: none;
        }
        input:focus { border-color: #00ff41; box-shadow: 0 0 5px rgba(0, 255, 70, 0.5); }
        button {
            width: 100%; padding: 12px; margin-top: 10px;
            background-color: #1a1a1a; color: #00ff41;
            border: 1px solid #00ff41; border-radius: 8px;
            cursor: pointer; font-weight: bold; font-family: 'Kanit', sans-serif;
            transition: 0.3s;
        }
        button:hover { background-color: #00ff41; color: #000; }
        #error-msg { color: red; font-size: 0.8rem; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="container">
        <div class="login-card">
            <h2>เข้าสู่ระบบ .@ NTSTN WiFi6</h2>
            <form id="loginForm">
                <input type="text" id="user" placeholder="ชื่อผู้ใช้งาน" required>
                <input type="password" id="pass" placeholder="รหัสผ่าน" required>
                <button type="submit">เข้าใช้งาน</button>
                <div id="error-msg">ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง!</div>
            </form>
        </div>
    </div>

    <script>
        // --- Matrix Background ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();

        const cCode = "#include <stdio.h> int main() { printf('NTSTN_WiFi6'); return 0; } malloc(void*) free(ptr) while(1)";
        const charArray = cCode.split("");
        const fontSize = 16;
        const columns = Math.floor(canvas.width / fontSize);
        const drops = Array(columns).fill(1);

        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0F0";
            ctx.font = fontSize + "px monospace";

            for (let i = 0; i < drops.length; i++) {
                const text = charArray[Math.floor(Math.random() * charArray.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        setInterval(draw, 33);

        // --- Login System ---
        document.getElementById('loginForm').onsubmit = function(e) {
            e.preventDefault();
            const fixedUser = "Aey"; 
            const fixedPass = "445566";

            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const error = document.getElementById('error-msg');

            if (u === fixedUser && p === fixedPass) {
                alert("ยินดีด้วย! คุณเข้าสู่ระบบสำเร็จ");
                window.location.href = "https://www.google.com";
            } else {
                error.style.display = "block";
                // ใส่ลูกเล่นสั่นที่การ์ดถ้าล็อกอินผิดก็น่าสนใจนะคุณเอ
            }
        };
    </script>
</body>
</html>
